version: '3'

includes:
  common: ./build/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml
  linux: ./build/linux/Taskfile.yml
  ios: ./build/ios/Taskfile.yml
  android: ./build/android/Taskfile.yml

vars:
  APP_NAME: "SoftDB"
  BIN_DIR: "bin"
  VITE_PORT: '{{.WAILS_VITE_PORT | default 9245}}'
  APP_VERSION:
    sh: git describe --tags --abbrev=0 2>/dev/null || echo "dev"
  APP_SEMVER:
    sh: git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0"

tasks:
  sync:version:
    summary: Syncs version from git tag into build/config.yml and frontend/package.json
    desc: |
      Reads the latest git tag and updates all version references.
      Run manually or let it run automatically as a build dependency.
    vars:
      VERSION:
        sh: git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0"
    cmds:
      - |
        VERSION="{{.VERSION}}"
        echo "Syncing version: $VERSION"
        # Update build/config.yml (info.version, 2-space indented)
        sed -i.bak 's/^  version: ".*"/  version: "'"$VERSION"'"/' build/config.yml && rm -f build/config.yml.bak
        # Update frontend/package.json
        sed -i.bak 's/"version": "[^"]*"/"version": "'"$VERSION"'"/' frontend/package.json && rm -f frontend/package.json.bak
        echo "✅ Version synced to $VERSION"
    status:
      - |
        VERSION="$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//')"
        grep -q "version: \"$VERSION\"" build/config.yml && grep -q "\"version\": \"$VERSION\"" frontend/package.json
  build:
    summary: Builds the application
    cmds:
      - task: "{{OS}}:build"

  package:
    summary: Packages a production build of the application
    cmds:
      - task: "{{OS}}:package"

  run:
    summary: Runs the application
    cmds:
      - task: "{{OS}}:run"

  dev:
    summary: Runs the application in development mode
    cmds:
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}

  setup:docker:
    summary: Builds Docker image for cross-compilation (~800MB download)
    cmds:
      - task: common:setup:docker

  build:server:
    summary: Builds the application in server mode (no GUI, HTTP server only)
    cmds:
      - task: common:build:server

  run:server:
    summary: Runs the application in server mode
    cmds:
      - task: common:run:server

  build:docker:
    summary: Builds a Docker image for server mode deployment
    cmds:
      - task: common:build:docker

  run:docker:
    summary: Builds and runs the Docker image
    cmds:
      - task: common:run:docker

  setup:hooks:
    summary: Configures git to use project hooks from .githooks/
    desc: |
      Run once after cloning to enable auto version sync on checkout/pull.
    cmds:
      - git config core.hooksPath .githooks
      - echo "✅ Git hooks configured from .githooks/"
    status:
      - git config core.hooksPath | grep -q '.githooks'

  test:
    summary: Runs backend tests
    cmds:
      - go test ./...

  test:race:
    summary: Runs backend tests with race detection
    cmds:
      - go test -race ./...

  coverage:
    summary: Generates backend test coverage
    cmds:
      - go test ./... -coverprofile=coverage.out

  lint:
    summary: Runs frontend type checks
    cmds:
      - cd frontend && npx tsc --noEmit

  check:
    summary: Runs test and lint checks
    deps: [test, lint]
