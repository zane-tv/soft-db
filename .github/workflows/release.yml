name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: amd64
            ext: ''
          - os: macos-latest
            platform: darwin
            arch: amd64
            ext: ''
          - os: macos-latest
            platform: darwin
            arch: arm64
            ext: ''
          - os: windows-latest
            platform: windows
            arch: amd64
            ext: '.exe'

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install Linux deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install frontend deps
        run: |
          cd frontend
          bun install

      - name: Build
        env:
          GOOS: ${{ matrix.platform }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 1
        run: wails3 build

      - name: Package artifact
        run: |
          mkdir -p dist
          if [ "${{ matrix.platform }}" = "windows" ]; then
            cp bin/SoftDB${{ matrix.ext }} dist/SoftDB-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.ext }}
          elif [ "${{ matrix.platform }}" = "darwin" ]; then
            cd bin
            tar -czf ../dist/SoftDB-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz SoftDB.app 2>/dev/null || tar -czf ../dist/SoftDB-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz SoftDB
          else
            tar -czf dist/SoftDB-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz -C bin SoftDB
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoftDB-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
