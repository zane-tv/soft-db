name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write # Required for Sigstore keyless signing

jobs:
  build-windows:
    runs-on: windows-latest
    name: Build Windows Installer

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install NSIS
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install frontend deps
        run: |
          cd frontend
          bun install

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Build & Create NSIS Installer
        run: wails3 task windows:package
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoftDB-windows-amd64
          path: bin/*-installer.exe

  build-macos:
    runs-on: macos-latest
    name: Build macOS

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend deps
        run: |
          cd frontend
          bun install

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Build & Package .app bundle
        run: wails3 task darwin:package

      - name: Create DMG
        run: |
          APP_NAME="SoftDB"
          DMG_NAME="SoftDB-darwin-arm64.dmg"
          STAGING_DIR=$(mktemp -d)

          cp -R "bin/${APP_NAME}.app" "${STAGING_DIR}/"

          # Create Applications symlink for drag-to-install
          ln -s /Applications "${STAGING_DIR}/Applications"

          # Create DMG
          hdiutil create -volname "${APP_NAME}" \
            -srcfolder "${STAGING_DIR}" \
            -ov -format UDZO \
            "bin/${DMG_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoftDB-darwin-arm64
          path: bin/SoftDB-darwin-arm64.dmg

  build-linux:
    runs-on: ubuntu-22.04
    name: Build Linux Packages

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # IMPORTANT: Linux deps MUST be installed before Wails CLI
      # because `go install wails3` compiles CGO code that links against GTK
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libfuse2

      - name: Install frontend deps
        run: |
          cd frontend
          bun install

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Build
        env:
          CGO_ENABLED: 1
        run: wails3 task linux:build

      - name: Create AppImage
        run: wails3 task linux:create:appimage
        continue-on-error: true

      - name: Create DEB package
        run: wails3 task linux:create:deb
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoftDB-linux-amd64
          path: |
            bin/*.AppImage
            bin/*.deb

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    name: Sign & Release
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          find artifacts -type f -exec cp {} release-files/ \;

      - name: Generate checksums
        working-directory: release-files
        run: sha256sum * > SHA256SUMS.txt

      - name: Sign all release files with Sigstore
        working-directory: release-files
        run: |
          for file in *; do
            case "$file" in
              *.bundle) continue ;;
            esac
            echo "Signing $file..."
            cosign sign-blob --yes "$file" \
              --bundle "${file}.bundle"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-files/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}

  update-homebrew:
    needs: [release]
    runs-on: ubuntu-latest
    name: Update Homebrew Cask
    if: ${{ !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'beta') }}

    steps:
      - name: Wait for release assets to be available
        run: |
          DMG_URL="https://github.com/zane-tv/soft-db/releases/download/${GITHUB_REF_NAME}/SoftDB-darwin-arm64.dmg"
          echo "Waiting for release assets to become available..."
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -sL -o /dev/null -w "%{http_code}" "$DMG_URL")
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ]; then
              echo "✅ DMG asset is available (HTTP $HTTP_CODE)"
              break
            fi
            echo "⏳ Attempt $i: DMG not yet available (HTTP $HTTP_CODE), waiting 30s..."
            sleep 30
          done
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "302" ]; then
            echo "❌ DMG asset not available after 5 attempts"
            exit 1
          fi

      - name: Checkout Homebrew tap repo
        uses: actions/checkout@v4
        with:
          repository: zane-tv/homebrew-softdb
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update Cask formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CHECKSUMS_URL="https://github.com/zane-tv/soft-db/releases/download/${GITHUB_REF_NAME}/SHA256SUMS.txt"
          DMG_URL="https://github.com/zane-tv/soft-db/releases/download/${GITHUB_REF_NAME}/SoftDB-darwin-arm64.dmg"

          # Try to get SHA256 from the checksums file first (faster)
          SHA256=$(curl -sfL "$CHECKSUMS_URL" | grep "SoftDB-darwin-arm64.dmg" | awk '{print $1}')

          # Fallback: download the DMG and compute hash directly
          if [ -z "$SHA256" ]; then
            echo "⚠️ Could not extract SHA from checksums, downloading DMG..."
            SHA256=$(curl -fSL "$DMG_URL" | sha256sum | awk '{print $1}')
          fi

          # Validate SHA256 format (must be 64 hex chars)
          if ! echo "$SHA256" | grep -qE '^[a-f0-9]{64}$'; then
            echo "❌ Invalid SHA256: '$SHA256'"
            exit 1
          fi

          echo "✅ Version: $VERSION"
          echo "✅ SHA256:  $SHA256"

          cat > Casks/softdb.rb << 'CASKEOF'
          cask "softdb" do
            version "VERSION_PLACEHOLDER"
            sha256 "SHA256_PLACEHOLDER"

            url "https://github.com/zane-tv/soft-db/releases/download/v#{version}/SoftDB-darwin-arm64.dmg"
            name "SoftDB"
            desc "Modern database management tool for PostgreSQL, MySQL, SQLite, MongoDB"
            homepage "https://github.com/zane-tv/soft-db"

            livecheck do
              url :url
              strategy :github_latest
            end

            depends_on macos: ">= :catalina"

            app "SoftDB.app"

            zap trash: [
              "~/Library/Application Support/SoftDB",
              "~/Library/Preferences/dev.zane.softdb.plist",
              "~/Library/Caches/SoftDB",
            ]
          end
          CASKEOF

          # Remove leading whitespace from heredoc and fill in version/sha256
          sed -i 's/^          //' Casks/softdb.rb
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/" Casks/softdb.rb
          sed -i "s/SHA256_PLACEHOLDER/${SHA256}/" Casks/softdb.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/softdb.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore(homebrew): update cask to v${GITHUB_REF_NAME#v}"
          git push
